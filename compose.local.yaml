# Local development override: build images from this checkout while reusing
# compose.yaml for runtime settings.
# Usage:
#   docker compose -f compose.yaml -f compose.local.yaml up --build -d
services:
  vusan:
    image: vusan:local
    build:
      context: .

  vusan-sandbox:
    image: vusan-sandbox:local
    build:
      context: ./sandbox
