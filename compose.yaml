x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  vusan:
    image: ghcr.io/helltar/vusan:latest
    container_name: vusan-container
    restart: unless-stopped
    env_file: .env
    networks:
      - default
      - vusan-sandbox-net
    volumes:
      - vusan-data:/app/data
    logging: *default-logging

  vusan-sandbox:
    image: ghcr.io/helltar/vusan-sandbox:latest
    container_name: vusan-sandbox-container
    restart: unless-stopped
    environment:
      SANDBOX_TIMEOUT_SECONDS: "${SANDBOX_TIMEOUT_SECONDS:-120}"
    networks:
      - vusan-sandbox-net
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: "2g"
    cpus: 2.0
    tmpfs:
      - /tmp
    logging: *default-logging

networks:
  vusan-sandbox-net:
    internal: true

volumes:
  vusan-data:
